# ══════════════════════════════════════════════════════════════════════════════
# PlotCAD — PostgreSQL Tuning
#
# Optimized for: Hostinger VPS (4-8GB RAM, SSD)
# Reads VPS memory dynamically, but these defaults target 4GB RAM.
# For 8GB RAM, double shared_buffers and effective_cache_size.
#
# Applied via: postgres -c config_file=/etc/postgresql/postgresql.conf
# ══════════════════════════════════════════════════════════════════════════════

# ── Connections ──────────────────────────────────────────────────────────────
max_connections = 60
superuser_reserved_connections = 3

# ── Memory (tuned for 4GB RAM VPS) ──────────────────────────────────────────
shared_buffers = 1GB
work_mem = 32MB
maintenance_work_mem = 256MB
effective_cache_size = 3GB
huge_pages = try

# ── WAL / Checkpoint ────────────────────────────────────────────────────────
wal_buffers = 32MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 1GB
min_wal_size = 256MB
wal_compression = zstd

# ── Planner (SSD optimized) ─────────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# ── Background Writer ───────────────────────────────────────────────────────
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# ── Autovacuum ───────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ── Logging ──────────────────────────────────────────────────────────────────
log_timezone = 'America/Sao_Paulo'
log_min_duration_statement = 500
log_line_prefix = '%t [%p-%l] user=%u,db=%d,app=%a '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# ── Locale ───────────────────────────────────────────────────────────────────
timezone = 'America/Sao_Paulo'
datestyle = 'iso, dmy'

# ── Security ─────────────────────────────────────────────────────────────────
password_encryption = scram-sha-256
ssl = off  # SSL handled by Nginx/Cloudflare, not needed for internal Docker network
