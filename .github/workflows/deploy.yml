name: Deploy PlotCAD

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "Skip build, deploy existing image"
        type: boolean
        default: false
      rollback:
        description: "Rollback to previous deployment"
        type: boolean
        default: false
      image_tag:
        description: "Image tag to deploy (default: latest build)"
        type: string
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/plotcad-api

permissions:
  contents: read
  packages: write

jobs:
  # ── Build & push Docker image to GHCR ────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_only && !inputs.rollback }}
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ── Build frontends ──────────────────────────────────────────────────────
  build-frontends:
    name: Build Frontends
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_only && !inputs.rollback }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            FrontEnd/PlotCAD/package-lock.json
            FrontEnd/PlotCAD.Admin/package-lock.json

      - name: Build App
        working-directory: FrontEnd/PlotCAD
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TILES_BASE_URL: ${{ secrets.VITE_TILES_BASE_URL }}
        run: |
          npm ci --prefer-offline
          npm run build

      - name: Build Admin
        working-directory: FrontEnd/PlotCAD.Admin
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci --prefer-offline
          npm run build

      - name: Package builds
        run: |
          mkdir -p dist/app dist/admin
          cp -r FrontEnd/PlotCAD/dist/*       dist/app/
          cp -r FrontEnd/PlotCAD.Admin/dist/* dist/admin/
          tar -czf frontends.tar.gz dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontends
          path: frontends.tar.gz
          retention-days: 7
          compression-level: 0  # already compressed

  # ── Deploy to VPS ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-api, build-frontends]
    if: |
      always() &&
      (needs.build-api.result == 'success' || inputs.deploy_only || inputs.rollback) &&
      (needs.build-frontends.result == 'success' || inputs.deploy_only || inputs.rollback)
    environment:
      name: production
      url: https://app.plotcad.com.br
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ needs.build-api.outputs.image_tag }}" ]]; then
            echo "tag=${{ needs.build-api.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/plotcad_vps
          chmod 600 ~/.ssh/plotcad_vps
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Sync infrastructure files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/plotcad_vps -o StrictHostKeyChecking=yes" \
            docker-compose.prod.yaml \
            postgres/postgresql.conf \
            nginx/ \
            scripts/deploy.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/plotcad/infra-sync/

          ssh -i ~/.ssh/plotcad_vps \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "
              cd /opt/plotcad &&
              cp infra-sync/docker-compose.prod.yaml . &&
              cp infra-sync/postgresql.conf postgres/ &&
              cp infra-sync/deploy.sh scripts/ && chmod +x scripts/deploy.sh &&
              cp infra-sync/upstream-blue.conf  nginx/ &&
              cp infra-sync/upstream-green.conf nginx/ &&
              cp infra-sync/plotcad.conf nginx/ &&
              rm -rf infra-sync
            "

      # Upload frontends (skip on deploy_only or rollback)
      - name: Download frontend artifacts
        if: ${{ !inputs.deploy_only && !inputs.rollback }}
        uses: actions/download-artifact@v4
        with:
          name: frontends

      - name: Upload frontends to VPS
        if: ${{ !inputs.deploy_only && !inputs.rollback }}
        run: |
          scp -i ~/.ssh/plotcad_vps \
            -o StrictHostKeyChecking=yes \
            frontends.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/frontends.tar.gz

      - name: Install frontends on VPS
        if: ${{ !inputs.deploy_only && !inputs.rollback }}
        run: |
          ssh -i ~/.ssh/plotcad_vps \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "
              cd /tmp &&
              tar -xzf frontends.tar.gz &&
              sudo rsync -a --delete /tmp/dist/app/   /var/www/plotcad/app/   &&
              sudo rsync -a --delete /tmp/dist/admin/  /var/www/plotcad/admin/ &&
              rm -rf /tmp/dist /tmp/frontends.tar.gz
            "

      # Deploy API (blue-green swap)
      - name: Deploy API
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          ROLLBACK_FLAG: ${{ inputs.rollback && '--rollback' || '' }}
        run: |
          ssh -i ~/.ssh/plotcad_vps \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "
              export IMAGE_TAG='${IMAGE_TAG}' &&
              sudo bash /opt/plotcad/scripts/deploy.sh '${IMAGE_TAG}' ${ROLLBACK_FLAG}
            "

      # Post-deploy verification
      - name: Verify deployment
        run: |
          sleep 5
          ssh -i ~/.ssh/plotcad_vps \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "
              echo '=== Container Status ===' &&
              docker ps --filter 'name=plotcad' --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' &&
              echo '' &&
              echo '=== Active Slot ===' &&
              cat /opt/plotcad/.active-slot 2>/dev/null || echo 'blue (default)' &&
              echo '' &&
              echo '=== Health Check ===' &&
              curl -sf http://localhost:\$(cat /opt/plotcad/.active-slot 2>/dev/null | sed 's/blue/5000/;s/green/5001/' || echo '5000')/health &&
              echo ' OK'
            "

      - name: Post summary
        if: always()
        run: |
          echo "### Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Rollback:** \`${{ inputs.rollback || false }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Database backup (runs before deploy) ─────────────────────────────────
  backup-db:
    name: Backup Database
    runs-on: ubuntu-latest
    if: ${{ !inputs.rollback }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/plotcad_vps
          chmod 600 ~/.ssh/plotcad_vps
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run backup
        run: |
          ssh -i ~/.ssh/plotcad_vps \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "
              BACKUP_DIR=/opt/plotcad/backups &&
              mkdir -p \$BACKUP_DIR &&
              FILENAME=\$BACKUP_DIR/plotcad_pre-deploy_\$(date +%Y%m%d_%H%M%S).sql.gz &&
              docker exec plotcad-postgres pg_dump -U plotcad -d PlotCAD --no-owner --no-privileges | gzip > \$FILENAME &&
              echo \"Backup created: \$FILENAME\" &&
              echo \"Size: \$(du -h \$FILENAME | cut -f1)\" &&
              ls -t \$BACKUP_DIR/plotcad_*.sql.gz | tail -n +8 | xargs rm -f 2>/dev/null || true
            "
