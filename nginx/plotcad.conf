# ══════════════════════════════════════════════════════════════════════════════
# PlotCAD — Nginx Production Config
#
# Architecture: Cloudflare (Full Strict SSL) → Nginx (443 with Origin Cert) → API
#
# Subdomains:
#   plotcad.com.br           → Landing page
#   app.plotcad.com.br       → App principal (React SPA)
#   admin.plotcad.com.br     → Backoffice (React SPA)
#   api.plotcad.com.br       → ASP.NET Core API (blue-green upstream)
#   tiles.plotcad.com.br     → PMTiles estáticos
#
# Prerequisites:
#   1. Cloudflare Origin Certificate in /etc/nginx/ssl/
#   2. Include cloudflare-ips.conf in /etc/nginx/nginx.conf http {} block
#   3. Active upstream symlink at /etc/nginx/conf.d/plotcad-upstream.conf
# ══════════════════════════════════════════════════════════════════════════════

# ── Rate limiting zones (include in http context or nginx.conf) ──────────
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;

# ── Active API upstream (managed by deploy.sh symlink swap) ──────────────
# This file is a symlink to either upstream-blue.conf or upstream-green.conf
include /etc/nginx/conf.d/plotcad-upstream.conf;

# ── Shared SSL config ────────────────────────────────────────────────────
# Reused across all server blocks via include
# File: /etc/nginx/snippets/plotcad-ssl.conf (created by setup-vps.sh)

# ── Block direct IP access (no valid Host header) ───────────────────────
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cf-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cf-origin.key;

    return 444;
}

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    server_name plotcad.com.br www.plotcad.com.br
                app.plotcad.com.br
                admin.plotcad.com.br
                api.plotcad.com.br
                tiles.plotcad.com.br;

    return 301 https://$host$request_uri;
}

# ══════════════════════════════════════════════════════════════════════════════
# 1. LANDING PAGE — plotcad.com.br
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name plotcad.com.br www.plotcad.com.br;

    ssl_certificate     /etc/nginx/ssl/cf-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cf-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/plotcad/landing;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml
               application/wasm;

    # Hashed assets: immutable cache
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300";
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# 2. APP PRINCIPAL — app.plotcad.com.br
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name app.plotcad.com.br;

    ssl_certificate     /etc/nginx/ssl/cf-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cf-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/plotcad/app;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml
               application/wasm;

    # Hashed assets: immutable cache
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# 3. BACKOFFICE — admin.plotcad.com.br
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name admin.plotcad.com.br;

    ssl_certificate     /etc/nginx/ssl/cf-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cf-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/plotcad/admin;

    # Strict security for backoffice
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # Hashed assets: immutable cache
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# 4. API — api.plotcad.com.br → Blue/Green upstream
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name api.plotcad.com.br;

    ssl_certificate     /etc/nginx/ssl/cf-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cf-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Auth endpoints: strict rate limit (5 req/min)
    location ~ ^/api/(auth|backoffice/auth) {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://plotcad_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        add_header Cache-Control "no-store" always;
    }

    # General API: moderate rate limit
    location / {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://plotcad_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Buffering for performance
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;

        add_header Cache-Control "no-store" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# 5. TILES — tiles.plotcad.com.br (PMTiles estáticos)
#
# Cloudflare Cache Rule (configure no painel CF — 1 regra, sem custo):
#   Se hostname = tiles.plotcad.com.br
#   → Cache Level: Cache Everything
#   → Edge TTL: 1 mês
#   → Browser TTL: respeitar origem
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name tiles.plotcad.com.br;

    ssl_certificate     /etc/nginx/ssl/cf-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cf-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/plotcad/tiles;

    # Disable access log for tiles (high volume, low value)
    access_log off;

    location / {
        # PMTiles requires HTTP Range Requests
        add_header Accept-Ranges bytes;

        # Long browser cache (Cloudflare edge TTL configured in CF dashboard)
        add_header Cache-Control "public, max-age=2592000, immutable";

        # CORS for frontend cross-origin requests
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges";

        # Preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type   "text/plain";
            add_header Content-Length 0;
            return 204;
        }

        # Zero-copy file serving
        sendfile    on;
        tcp_nopush  on;
        tcp_nodelay on;

        # Open file cache: reduce syscalls for frequently accessed files
        open_file_cache          max=200 inactive=30m;
        open_file_cache_valid    60m;
        open_file_cache_min_uses 2;
        open_file_cache_errors   on;

        try_files $uri $uri/ =404;
    }

    # GeoJSON (RBMC stations, lightweight, no Range)
    location ~* \.geojson$ {
        add_header Content-Type "application/geo+json";
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
        sendfile on;
    }
}
